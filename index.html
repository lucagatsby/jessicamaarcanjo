<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Achados da Jé</title>
<style>
  :root {
    --bg: #0f0f14;
    --card: #1c1c24;
    --card-hover: #26262f;
    --text: #f2f2f2;
    --muted: #9a9aa5;
    --accent: #ff5a7a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 16px 60px;
  }
  .container { width: 100%; max-width: 480px; }
  .profile { text-align: center; margin-bottom: 24px; }
  .avatar {
    width: 96px; height: 96px; border-radius: 50%;
    object-fit: cover; border: 3px solid var(--accent);
    margin-bottom: 12px;
  }
  .name { font-size: 20px; font-weight: 700; margin: 0; }
  .bio { color: var(--muted); font-size: 14px; margin: 6px 0 0; }
  .links { display: flex; flex-direction: column; gap: 14px; margin-top: 24px; }
  .link-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--card);
    border-radius: 16px;
    padding: 14px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.2s, transform 0.15s;
  }
  .link-card:hover { background: var(--card-hover); transform: translateY(-2px); }
  .link-thumb {
    width: 56px; height: 56px; border-radius: 10px;
    object-fit: cover; flex-shrink: 0; background: #333;
  }
  .link-info { flex: 1; min-width: 0; }
  .link-title { font-weight: 600; font-size: 15px; margin: 0 0 2px; }
  .link-desc {
    color: var(--muted); font-size: 12px; margin: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .arrow { color: var(--muted); font-size: 18px; }
  footer { text-align: center; margin-top: 32px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <img class="avatar" src="https://via.placeholder.com/96" alt="Foto de perfil">
      <p class="name">Achados da Jé</p>
      <p class="bio">Conteúdo, conversa e achadinhos com preço bom 💬🛍️</p>
    </div>

    <div class="links">
      <a class="link-card" href="produtos.html">
        <img class="link-thumb" src="https://via.placeholder.com/56" alt="">
        <div class="link-info">
          <p class="link-title">🛍️ Meus Achadinhos</p>
          <p class="link-desc">Ver produtos com desconto</p>
        </div>
        <span class="arrow">›</span>
      </a>

      <a class="link-card" href="https://wa.me/5500000000000" target="_blank">
        <img class="link-thumb" src="https://via.placeholder.com/56" alt="">
        <div class="link-info">
          <p class="link-title">Fale comigo no WhatsApp</p>
          <p class="link-desc">Clique para conversar</p>
        </div>
        <span class="arrow">›</span>
      </a>

      <a class="link-card" href="#" target="_blank">
        <img class="link-thumb" src="https://via.placeholder.com/56" alt="">
        <div class="link-info">
          <p class="link-title">Instagram</p>
          <p class="link-desc">@seuinstagram</p>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>

    <footer>© 2026 Achados da Jé — feito com ❤️</footer>
  </div>
</body>
</html>
