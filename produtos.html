<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Achados da Jé</title>
<style>
  :root {
    --bg: #0f0f14;
    --card: #1c1c24;
    --card-hover: #26262f;
    --text: #f2f2f2;
    --muted: #9a9aa5;
    --accent: #ff5a7a;
    --price: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 16px 60px;
  }
  .container { width: 100%; max-width: 480px; }

  .profile { text-align: center; margin-bottom: 24px; }
  .avatar {
    width: 96px; height: 96px; border-radius: 50%;
    object-fit: cover; border: 3px solid var(--accent);
    margin-bottom: 12px;
  }
  .name { font-size: 22px; font-weight: 800; margin: 0; }
  .bio { color: var(--muted); font-size: 14px; margin: 6px 0 0; }

  .products { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }

  .product-card {
    display: block;
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.15s, background 0.2s;
  }
  .product-card:hover { background: var(--card-hover); transform: translateY(-2px); }

  .product-image {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    background: #2a2a33;
  }

  .product-info { padding: 14px 16px; }
  .product-name {
    font-weight: 600; font-size: 15px; margin: 0 0 6px;
    line-height: 1.3;
  }
  .product-price {
    color: var(--price); font-weight: 700; font-size: 16px; margin: 0 0 10px;
  }
  .product-price .old-price {
    color: var(--muted); text-decoration: line-through;
    font-weight: 400; font-size: 13px; margin-right: 6px;
  }
  .buy-button {
    display: block;
    text-align: center;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    padding: 10px;
    border-radius: 10px;
  }

  footer { text-align: center; margin-top: 32px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <img class="avatar" src="https://via.placeholder.com/96" alt="Foto de perfil">
      <p class="name">Achados da Jé</p>
      <p class="bio">Os melhores achadinhos com o menor preço 🛍️✨</p>
    </div>

    <div class="products">

      <!-- PRODUTO 1 -->
      <a class="product-card" href="https://shopee.com.br/SEU-LINK-DE-AFILIADO-1" target="_blank">
        <img class="product-image" src="https://via.placeholder.com/400" alt="Nome do produto 1">
        <div class="product-info">
          <p class="product-name">Nome do Produto 1</p>
          <p class="product-price"><span class="old-price">R$ 99,90</span> R$ 49,90</p>
          <span class="buy-button">Ver oferta →</span>
        </div>
      </a>

      <!-- PRODUTO 2 -->
      <a class="product-card" href="https://shopee.com.br/SEU-LINK-DE-AFILIADO-2" target="_blank">
        <img class="product-image" src="https://via.placeholder.com/400" alt="Nome do produto 2">
        <div class="product-info">
          <p class="product-name">Nome do Produto 2</p>
          <p class="product-price">R$ 29,90</p>
          <span class="buy-button">Ver oferta →</span>
        </div>
      </a>

      <!-- PRODUTO 3 -->
      <a class="product-card" href="https://shopee.com.br/SEU-LINK-DE-AFILIADO-3" target="_blank">
        <img class="product-image" src="https://via.placeholder.com/400" alt="Nome do produto 3">
        <div class="product-info">
          <p class="product-name">Nome do Produto 3</p>
          <p class="product-price"><span class="old-price">R$ 59,90</span> R$ 34,90</p>
          <span class="buy-button">Ver oferta →</span>
        </div>
      </a>

    </div>

    <footer>© 2026 Achados da Jé — feito com ❤️</footer>
  </div>
</body>
</html>
